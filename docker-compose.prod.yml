services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - default

  backend:
    build: ./backend
    volumes:
      - ./data:/data:ro
      - static_files:/app/staticfiles
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.colaboracao-api-web.rule=Host(`colaboracao.bcc2.ifg.edu.br`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`))"
      - "traefik.http.routers.colaboracao-api-web.entrypoints=web"
      - "traefik.http.routers.colaboracao-api-web.priority=10"
      - "traefik.http.routers.colaboracao-api-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.colaboracao-api-web.service=colaboracao-api-web"
      - "traefik.http.services.colaboracao-api-web.loadbalancer.server.port=8000"

      - "traefik.http.routers.colaboracao-api-websecure.rule=Host(`colaboracao.bcc2.ifg.edu.br`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`))"
      - "traefik.http.routers.colaboracao-api-websecure.entrypoints=websecure"
      - "traefik.http.routers.colaboracao-api-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.colaboracao-api-websecure.priority=10"
      - "traefik.http.routers.colaboracao-api-websecure.service=colaboracao-api-websecure"
      - "traefik.http.services.colaboracao-api-websecure.loadbalancer.server.port=8000"
    restart: unless-stopped
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      target: production
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.colaboracao-web-web.rule=Host(`colaboracao.bcc2.ifg.edu.br`)"
      - "traefik.http.routers.colaboracao-web-web.entrypoints=web"
      - "traefik.http.routers.colaboracao-web-web.priority=1"
      - "traefik.http.routers.colaboracao-web-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.colaboracao-web-websecure.service=colaboracao-web-web"
      - "traefik.http.services.colaboracao-web-web.loadbalancer.server.port=80"

      - "traefik.http.routers.colaboracao-web-websecure.rule=Host(`colaboracao.bcc2.ifg.edu.br`)"
      - "traefik.http.routers.colaboracao-web-websecure.entrypoints=websecure"
      - "traefik.http.routers.colaboracao-web-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.colaboracao-web-websecure.priority=1"
      - "traefik.http.routers.colaboracao-web-websecure.service=colaboracao-web-websecure"
      - "traefik.http.services.colaboracao-web-websecure.loadbalancer.server.port=80"
    restart: unless-stopped
    networks:
      - default

volumes:
  postgres_data:
  static_files:

networks:
  default:
    driver: bridge
