server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolução de DNS do Docker Compose feita em tempo de requisição
    # (não na inicialização do nginx), para não crashar se o backend
    # ainda não estiver no ar quando o container do frontend subir.
    resolver 127.0.0.11 valid=30s;
    set $backend http://backend:8000;

    location /api/ {
        proxy_pass $backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass $backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass $backend/static/;
    }

    location / {
        try_files $uri /index.html;
    }
}
